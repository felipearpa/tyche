name: .NET unit tests

on:
  pull_request:
    paths:
      - "Amazon.Lambda/**"
      - ".github/workflows/dotnet-unit-tests.yml"

concurrency:
  group: dotnet-unit-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: Amazon.Lambda

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Amazon.Lambda/**/*.fsproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore Felipearpa.Tyche.slnx

      - name: Run unit tests
        run: dotnet test Felipearpa.Tyche.slnx --no-restore --nologo --verbosity minimal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-unit-test-results
          path: Amazon.Lambda/**/TestResults/*.trx
          if-no-files-found: ignore
          retention-days: 7
